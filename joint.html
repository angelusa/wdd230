<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ilisapeci Kaboa">
    <meta name="description" content="Assignment portal Ilisapeci Kaboa in WDD 230: Web Frontend Development at BYUI">
    <meta property="og:title" content="Ilisapeci Kaboa Assignment Portal">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.ci.larkspur.ca.us/image.jpg">
    <meta property="og:url" content="https://angelusa.github.io/wdd230/">
    <title>Ilisapeci Kaboa Assignment Portal - WDD 230 - Web Frontend Development</title>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="navbar">
                <div class="nav-logo">
                    <img class="image" src="images/ili.webp" alt="me">
                </div>
                <div class= "e">
                    <h1>Ilisapeci Kaboa</h1>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="lesson03/chamber-site-plan.html">Site Plan</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chamber/">Chamber</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://www.churchofjesuschrist.org/study/scriptures">Scripture</a>
                        </li>
                    </ul>
                </div>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </nav>
        </header>
        <main>
            <form action="thankyou.html" method="get">
                <div class="form-row">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required tabindex="1">

                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required tabindex="2">

                    <label for="position">Title/Position:</label>
                    <input type="text" id="position" name="position" required pattern="[A-Za-z -]{7,}" tabindex="3">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@example.com" tabindex="4">

                    <label for="phone">Mobile Phone:</label>
                    <input type="tel" id="phone" name="phone" required tabindex="5">

                    <label for="organization">Organization Name:</label>
                    <input type="text" id="organization" name="organization" required tabindex="6">

                    <label for="membership">Membership Level:</label>
                    <select id="membership" name="membership" tabindex="7">
                        <option value="NP">NP Membership (Non-profit)</option>
                        <option value="Bronze">Bronze Membership</option>
                        <option value="Silver">Silver Membership</option>
                        <option value="Gold">Gold Membership</option>
                    </select>

                    <label for="description">Organization Description:</label>
                    <textarea id="description" name="description" tabindex="8"></textarea>

                    <input type="hidden" id="formLoadedTime" name="formLoadedTime">

                    <button type="submit" tabindex="9">Submit</button>
                </div>
            </form>
        </main>
        <footer>
            &copy;<span id="currentYear">2024</span> Ilisapeci Kaboa | Larkspur, CA | <a target="_blank" href="https://byui.edu/online">BYUI Online Learning</a>
        </footer>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <script src="scripts/getdates.js"></script>
    <script src="scripts/hamburger.js"></script>
    <script>
        // Set the value of the hidden input field with the current date/time
        document.getElementById("formLoadedTime").value = Date.now();
    </script>
    <script>
        WebFont.load({
            google: {
                families: ['Montserrat:300,400,700']
            }
        });
    </script>
    <script src="lesson3/scripts/script.js"></script>
</body>
</html>
