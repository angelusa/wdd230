<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Ilisapeci Kaboa">
    <meta name="description" content="Wee 8 Assignment">
    <meta property="og:title" content="Simple Form">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.ci.larkspur.ca.us/image.jpg">
    <meta property="og:url" content="https://angelusa.github.io/wdd230/">
    <title>Ilisapeci Kaboa Portal - WDD 230 - Web Frontend Development</title>
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/medium.css">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="navbar">
                <div class="nav-logo">
                    <img class="image" src="images/ili.webp" alt="me">
                </div>
                <div class= "e">
                    <h1>Ilisapeci Kaboa</h1>
                    <ul class="nav-menu">
                        <li class="nav-item">
                            <a class="nav-link" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="lesson03/chamber-site-plan.html">Site Plan</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chamber/">Chamber</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="https://www.churchofjesuschrist.org/study/scriptures">Scripture</a>
                        </li>
                    </ul>
                </div>
                <div class="hamburger">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </div>
            </nav>
        </header>
        <main>
            <form id="signupForm" method="get" action="record.html">
                <div>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required pattern="^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{8,}$">
                </div>
                <div>
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                    <span id="passwordMatchError">Passwords do not match. Please try again.</span>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" title="A valid byui.edu email address.">
                </div>
                <div>
                    <label for="pageRating">Page Rating:</label>
                    <input type="range" id="pageRating" name="pageRating" min="1" max="10" step="1" oninput="ratingOutput.value = pageRating.value">
                    <output id="ratingOutput">5</output>
                </div>
                <button type="submit">Submit</button>
            </form>
        </main>
        <footer>
            &copy;<span id="currentYear">2024</span> Ilisapeci Kaboa | Larkspur, CA | <a target="_blank" href="https://byui.edu/online">BYUI Online Learning</a>
        </footer>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js"></script>
    <script src="scripts/getdates.js"></script>
    <script src="scripts/hamburger.js"></script>
    <script>
        const form = document.getElementById('signupForm');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const passwordMatchError = document.getElementById('passwordMatchError');

        form.addEventListener('submit', function(event) {
            if (password.value !== confirmPassword.value) {
                event.preventDefault();
                passwordMatchError.style.display = 'block';
                password.value = '';
                confirmPassword.value = '';
                password.focus();
            }
        });
    </script>
    <script>
        WebFont.load({
            google: {
                families: ['Montserrat:300,400,700']
            }
        });
    </script>
    <script src="lesson3/scripts/script.js"></script>
</body>
</html>
