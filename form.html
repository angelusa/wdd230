<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>


    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <!-- Header -->               
    <header class="container">
        <nav class="navbar">
            <div class="nav-logo">
                <img class="nav-logo" src="images/ili.webp" alt="me">
            </div>
            <div class="e">
                <h1 class="site-title">Ilisapeci Kaboa</h1>
                <ul class="nav-menu">
                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="lesson03/chamber-site-plan.html">Site Plan</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="chamber/">Chamber</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://www.churchofjesuschrist.org/study/scriptures">Scripture</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <h2 class="form-title">Form</h2>
        <form action="record.html" method="get">
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required pattern="[A-Za-z0-9]{8,}">
            </div>
            <div>
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required pattern="[a-zA-Z0-9._%+-]+@byui\.edu$" title="A valid byui.edu email address.">
            </div>
            <div>
                <label for="page_rating">Page Rating:</label>
                <input type="range" id="page_rating" name="page_rating" min="1" max="10" step="1" onchange="document.getElementById('rating_value').innerHTML = this.value;">
                <span id="rating_value">5</span>
            </div>
            <div>
                <button type="submit">Submit</button>
            </div>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        &copy;<span id="currentYear">2024</span> Ilisapeci Kaboa | Larkspur, CA | <a target="_blank" href="https://byui.edu/online">BYUI Online Learning</a>
    </footer>
</body>
</html>
