    <main>
        <main>
            <form action="thankyou.html" method="get">
                <div class="form-row">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required tabindex="1">

                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required tabindex="2">

                    <label for="position">Title/Position:</label>
                    <input type="text" id="position" name="position" required pattern="[A-Za-z -]{7,}" tabindex="3">

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="example@example.com" tabindex="4">

                    <label for="phone">Mobile Phone:</label>
                    <input type="tel" id="phone" name="phone" required tabindex="5">

                    <label for="organization">Organization Name:</label>
                    <input type="text" id="organization" name="organization" required tabindex="6">

                    <label for="membership">Membership Level:</label>
                    <select id="membership" name="membership" tabindex="7">
                        <option value="NP">NP Membership (Non-profit)</option>
                        <option value="Bronze">Bronze Membership</option>
                        <option value="Silver">Silver Membership</option>
                        <option value="Gold">Gold Membership</option>
                    </select>

                    <label for="description">Organization Description:</label>
                    <textarea id="description" name="description" tabindex="8"></textarea>

                    <input type="hidden" id="formLoadedTime" name="formLoadedTime">

                    <button type="submit" tabindex="9">Submit</button>
                </div>
            </form>
        </main>
    
    </main>
